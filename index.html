<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Nardelli v2.6 - Monitor de Trading</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent: #58a6ff;
            --success: #238636;
            --danger: #da3633;
            --warning: #d29922;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid #30363d;
            margin-bottom: 20px;
        }

        .mep-box {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
        }

        #timer {
            font-family: monospace;
            color: var(--warning);
            font-size: 1.1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid #30363d;
        }

        th {
            background-color: #21262d;
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #21262d;
        }

        .rsi-high { color: var(--danger); font-weight: bold; }
        .rsi-low { color: var(--success); font-weight: bold; }
        .neutral { color: #8b949e; }

        .btn-scan {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-scan:hover { opacity: 0.8; }

        h2 { border-left: 4px solid var(--accent); padding-left: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 1.5rem;">Protocolo Nardelli v2.6</h1>
            <div id="timer">Próximo escaneo en: 5:00</div>
        </div>
        <div class="mep-box">
            DÓLAR MEP: <span id="mep-valor">Calculando...</span>
        </div>
        <button class="btn-scan" onclick="ejecutarEscaneoCompleto()">ESCANEAR AHORA</button>
    </div>

    <h2>Panel Merval (Pesos)</h2>
    <table id="tabla-merval">
        <thead>
            <tr>
                <th>Activo</th>
                <th>Precio</th>
                <th>Var %</th>
                <th>RSI (14)</th>
                <th>MACD Hist.</th>
                <th>Señal</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>Panel CEDEARs</h2>
    <table id="tabla-cedears">
        <thead>
            <tr>
                <th>Activo</th>
                <th>Precio</th>
                <th>Var %</th>
                <th>RSI (14)</th>
                <th>MACD Hist.</th>
                <th>Señal</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const TICKERS_MERVAL = ['ALUA.BA', 'YPFD.BA', 'PAMP.BA', 'GGAL.BA', 'BMA.BA', 'CEPU.BA'];
        const TICKERS_CEDEARS = ['AAPL', 'TSLA', 'AMZN', 'META', 'MELI', 'KO', 'NVDA'];
        
        let tiempoRestante = 300;

        // --- MOTOR DE DATOS (Optimizado para GitHub) ---
        async function fetchYahoo(ticker) {
            const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=4mo`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yfUrl)}&_=${Date.now()}`;
            
            try {
                const res = await fetch(proxyUrl);
                const json = await res.json();
                const d = JSON.parse(json.contents).chart.result[0];
                
                const prices = d.indicators.quote[0].close.filter(p => p != null);
                return {
                    ticker: ticker.replace('.BA', ''),
                    currentPrice: d.meta.regularMarketPrice.toFixed(2),
                    change: ((d.meta.regularMarketPrice / d.meta.chartPreviousClose - 1) * 100).toFixed(2),
                    history: prices
                };
            } catch (e) { return null; }
        }

        // --- CÁLCULOS TÉCNICOS ---
        function calcularRSI(prices, period = 14) {
            let gains = 0, losses = 0;
            for (let i = prices.length - period; i < prices.length; i++) {
                let diff = prices[i] - prices[i-1];
                if (diff >= 0) gains += diff; else losses -= diff;
            }
            let rs = (gains / period) / (losses / period);
            return (100 - (100 / (1 + rs))).toFixed(2);
        }

        // --- ACTUALIZACIÓN DE INTERFAZ ---
        async function actualizarMEP() {
            const mepSpan = document.getElementById('mep-valor');
            try {
                const urlP = `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/GD30.BA?interval=1m&range=1d')}`;
                const urlD = `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/GD30D.BA?interval=1m&range=1d')}`;
                
                const [rP, rD] = await Promise.all([fetch(urlP), fetch(urlD)]);
                const p = JSON.parse((await rP.json()).contents).chart.result[0].meta.regularMarketPrice;
                const d = JSON.parse((await rD.json()).contents).chart.result[0].meta.regularMarketPrice;
                
                mepSpan.innerText = `$${(p/d).toFixed(2)}`;
            } catch(e) { mepSpan.innerText = "Error"; }
        }

        async function llenarTabla(lista, tablaId) {
            const tbody = document.querySelector(`#${tablaId} tbody`);
            tbody.innerHTML = "";
            
            for (let t of lista) {
                const data = await fetchYahoo(t);
                if (!data) continue;

                const rsi = calcularRSI(data.history);
                let rsiClass = "neutral";
                let señal = "NEUTRAL";

                if (rsi < 35) { rsiClass = "rsi-low"; señal = "COMPRA"; }
                else if (rsi > 65) { rsiClass = "rsi-high"; señal = "VENTA"; }

                const row = `<tr>
                    <td><b>${data.ticker}</b></td>
                    <td>$${data.currentPrice}</td>
                    <td style="color: ${data.change >= 0 ? 'var(--success)' : 'var(--danger)'}">${data.change}%</td>
                    <td class="${rsiClass}">${rsi}</td>
                    <td>--</td>
                    <td style="font-weight:bold; color: ${señal === 'COMPRA' ? 'var(--success)' : (señal === 'VENTA' ? 'var(--danger)' : 'white')}">${señal}</td>
                </tr>`;
                tbody.innerHTML += row;
            }
        }

        function ejecutarEscaneoCompleto() {
            actualizarMEP();
            llenarTabla(TICKERS_MERVAL, 'tabla-merval');
            llenarTabla(TICKERS_CEDEARS, 'tabla-cedears');
            tiempoRestante = 300;
        }

        // --- RELOJ Y AUTO-START ---
        setInterval(() => {
            let min = Math.floor(tiempoRestante / 60);
            let seg = tiempoRestante % 60;
            document.getElementById('timer').innerText = `Próximo escaneo en: ${min}:${seg < 10 ? '0'+seg : seg}`;
            if (--tiempoRestante < 0) ejecutarEscaneoCompleto();
        }, 1000);

        window.onload = ejecutarEscaneoCompleto;
    </script>
</body>
</html>
